<!DOCTYPE html>
<html>
    <head>
        <title>carousel example</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" inital-scale="1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
       <header>
            <div class="z-2 position-absolute w-100 top-0 start-0">
                <div class="top-part ms-auto d-flex gap-3 justify-content-end px-3 py-3">
                    <a class="nav-link" href="#"><button class="btn">Video tutorial</button></a>
                    <a class="nav-link" href="#"><button class="btn btn-outline-light">DOWNLOAD FOR WIN</button></a>
                    <a class="nav-link" href="#"><button class="btn btn-outline-light">DOWNLOAD FOR MAC</button></a>
                </div>
                </div>
        </header>

 
            <div id="carousel-example" class="carousel slide" data-bs-wrap="false">
       
                <div class="carousel-indicators">
                    <button type="button"  data-bs-target="#carousel-example" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button"  data-bs-target="#carousel-example" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button"  data-bs-target="#carousel-example" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>

            <div class="carousel-inner">
                <div class="carousel-item active">
                <img class="carousel-image d-block w-100" src="images/image1.png" alt="not available">
                     <section class="hero">
            <div class=" container z-2 position-absolute top-0 end-0 mb-3 mt-5 py-5 px-5">
                <h1 class="hero-text">example of</h1>
                <div class="d-flex gap-3 mt-5">
                <button type="button" class="btn icon-btn btn-outline-light">WINDOWNS</button>
                 <button type="button" class="btn icon-btn btn-outline-light">FOR MAC</button>
                 </div>

            </div>
            </section>

                </div>
                <div class="carousel-item">
                    <img class="carousel-image d-block w-100" src="images/image2.png" alt="not available">
                    <section class="hero">
            <div class=" container z-2 position-absolute top-0 end-0 mb-3 mt-5 py-5 px-5">
                <h1 class="hero-text">responsive corousel</h1>
                <div class="d-flex gap-3 mt-5">
                <button type="button" class="btn icon-btn btn-outline-light">WINDOWNS</button>
                 <button type="button" class="btn icon-btn btn-outline-light">FOR MAC</button>
                 </div>

            </div>
            </section>
                </div>
                     
                <div class="carousel-item">
                    <img class="carousel-image d-block w-100" src="images/image3.png" alt="not available">
                         <section class="hero">
            <div class=" container z-2 position-absolute top-0 end-0 mb-3 mt-5 py-5 px-5">
                <h1 class="hero-text">Using bootstrap</h1>
                <div class="d-flex gap-3 mt-5">
                <button type="button" class="btn icon-btn btn-outline-light">WINDOWNS</button>
                 <button type="button" class="btn icon-btn btn-outline-light">FOR MAC</button>
                 </div>

            </div>
            </section>
                </div>
            </div>  
        <button type="button" class="carousel-control-prev z-3 position-absolute" data-bs-target="#carousel-example" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">previous</span>
        </button>
        <button type="button" class="carousel-control-next z-3 position-absolute" data-bs-target="#carousel-example" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">next</span>
        </button>
        </div>
       
    



    </body>
</html>
